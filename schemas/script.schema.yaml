$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Novel To Script YAML Schema"
type: object
additionalProperties: false
required:
  - metadata
  - source_info
  - characters
  - chapters
  - script
  - global_notes
properties:
  metadata:
    type: object
    additionalProperties: false
    required:
      - title
      - version
      - generated_at
      - language
      - target_format
    properties:
      title:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
      generated_at:
        type: string
        minLength: 1
      language:
        type: string
        minLength: 1
      genre:
        type: string
      target_format:
        type: string
        minLength: 1

  source_info:
    type: object
    additionalProperties: false
    required:
      - source_type
      - chapter_count
    properties:
      source_type:
        type: string
        minLength: 1
      chapter_count:
        type: integer
        minimum: 3
      word_count:
        type: integer
        minimum: 0
      input_summary:
        type: string

  characters:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - character_id
        - name
        - role
      properties:
        character_id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
        traits:
          type: array
          items:
            type: string

  chapters:
    type: array
    minItems: 3
    items:
      type: object
      additionalProperties: false
      required:
        - chapter_id
        - title
        - summary
      properties:
        chapter_id:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1

  script:
    type: object
    additionalProperties: false
    required:
      - scenes
    properties:
      scenes:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required:
            - scene_id
            - source_chapter
            - location
            - time
            - characters_in_scene
            - summary
            - conflicts
            - plot_points
            - actions
            - dialogues
            - narration
            - emotions
            - transitions
            - notes
          properties:
            scene_id:
              type: string
              minLength: 1
            source_chapter:
              type: string
              minLength: 1
            location:
              type: string
              minLength: 1
            time:
              type: string
              minLength: 1
            characters_in_scene:
              type: array
              items:
                type: string
                minLength: 1
            summary:
              type: string
              minLength: 1
            conflicts:
              type: array
              items:
                type: string
            plot_points:
              type: array
              items:
                type: string
            actions:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - actor
                  - description
                properties:
                  actor:
                    type: string
                    minLength: 1
                  description:
                    type: string
                    minLength: 1
            dialogues:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - speaker
                  - line
                properties:
                  speaker:
                    type: string
                    minLength: 1
                  line:
                    type: string
                    minLength: 1
                  emotion:
                    type: string
            narration:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - type
                  - text
                properties:
                  type:
                    type: string
                    minLength: 1
                  text:
                    type: string
                    minLength: 1
            emotions:
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - character
                  - emotion
                  - evidence
                properties:
                  character:
                    type: string
                    minLength: 1
                  emotion:
                    type: string
                    minLength: 1
                  evidence:
                    type: string
                    minLength: 1
            transitions:
              type: object
              additionalProperties: false
              required:
                - type
              properties:
                type:
                  type: string
                  minLength: 1
                next_scene_id:
                  type: string
                description:
                  type: string
            notes:
              type: array
              items:
                type: string

  global_notes:
    type: array
    items:
      type: string
